name: lint
on: [push, pull_request]
jobs:
  self-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: skill self-lint
        run: python3 scripts/lint.py
      - name: image prompt validator self-test
        run: npm test
      - name: installer smoke test
        run: npm run smoke:install
      - name: shared-core runtime adapter smoke
        run: npm run smoke:runtime
